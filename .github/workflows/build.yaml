name: AV Matrix Synapse Manager

env:
  # The name of the main module repository
  main_project_module: pt.aguiarvieira.synapsemanager

  # The name of the Play Store
  playstore_name: Synapse Manager

on:

  #pull_request:
  #merge_group:
  #push:
  #  branches: [ main, develop, master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set App ID
        run: echo "APP_ID=pt.aguiarvieira.synapsemanager" >> $GITHUB_ENV

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '21'
          cache: 'gradle'
          
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache
          key: ${{ runner.os }}-gradle-build-cache-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-build-cache-
            
      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assemble --stacktrace --no-daemon --parallel --build-cache

      - name: List all APKs
        run: |
          echo "### Built APKs" >> $GITHUB_STEP_SUMMARY
          find app/ -name "*.apk" | tee -a $GITHUB_STEP_SUMMARY
          
      - name: Upload R8 Missing Rules
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: r8-missing-rules
          path: app/build/outputs/mapping/release/missing_rules.txt

      # Upload Artifact Build
      # Noted For Output [main_project_module]/build/outputs/apk/debug/
      - name: Upload debug APK 
        uses: actions/upload-artifact@v4
        with:
          name: pt.aguiarvieira.andromuks-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK 
        uses: actions/upload-artifact@v4
        with:
          name: pt.aguiarvieira.synapsemanager-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Deploy Nightly Debug
        uses: WebFreak001/deploy-nightly@v3.1.0
        with:
          upload_url: https://uploads.github.com/repos/ricardo-duarte-av/matrix-synapse-manager-android/releases/291866459/assets{?name,label} # find out this value by opening https://api.github.com/repos/<owner>/<repo>/releases in your browser and copy the full "upload_url" value including the {?name,label} part
          release_id: 291866459 # same as above (id can just be taken out the upload_url, it's used to find old releases)
          asset_path: app/build/outputs/apk/debug/app-debug.apk # path to archive to upload
          asset_name: synapsemanager.aguiarvieira.pt-debug-A-$$.apk # name to upload the release as, use $$ to insert date (YYYYMMDD) and 6 letter commit hash
          asset_content_type: application/vnd.android.package-archive # required by GitHub API
          max_releases: 10 # optional, if there are more releases than this matching the asset_name, the oldest ones are going to be deleted

      - name: Deploy Nightly Release
        uses: WebFreak001/deploy-nightly@v3.1.0
        with:
          upload_url: https://uploads.github.com/repos/ricardo-duarte-av/matrix-synapse-manager-android/releases/291866459/assets{?name,label} # find out this value by opening https://api.github.com/repos/<owner>/<repo>/releases in your browser and copy the full "upload_url" value including the {?name,label} part
          release_id: 291866459 # same as above (id can just be taken out the upload_url, it's used to find old releases)
          asset_path: app/build/outputs/apk/release/app-release.apk # path to archive to upload
          asset_name: synapsemanager.aguiarvieira.pt-release-A-$$.apk # name to upload the release as, use $$ to insert date (YYYYMMDD) and 6 letter commit hash
          asset_content_type: application/vnd.android.package-archive # required by GitHub API
          max_releases: 10 # optional, if there are more releases than this matching the asset_name, the oldest ones are going to be deleted
